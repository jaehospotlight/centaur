# Spotlight deployment values — Mac mini (kind, locally built arm64 images).
# Layered on top of values.dev.yaml:
#   helm ... -f values.dev.yaml -f values.spotlight.yaml
# Differences from dev: env-backed secrets (no 1Password), Claude Code as the
# default harness on the Claude Max subscription, console disabled to avoid
# building the Rails image, and the Spotlight overlay sources.

secretManager:
  backend: env
  envPrefix: ""
  existingSecretName: centaur-infra-env

ironProxy:
  # iron-proxy resolves tool/harness credentials from env vars on the proxy
  # container (backed by the centaur-infra-env Secret) instead of 1Password.
  secretSource: env
  manager:
    secretSource: env

# console (iron-control) is mandatory: per-sandbox iron-proxies sync their
# effective config from it. values.dev.yaml already enables it.

sandbox:
  # Claude Code is the default harness for new threads (--codex/--amp still
  # available per-thread), authenticated with the Max subscription.
  harnessEngine: claudecode
  # api_key mode + CLAUDE_CODE_OAUTH_TOKEN passthrough (below): the CLI sends
  # the dedicated long-lived setup-token itself. access_token/broker mode was
  # abandoned 2026-07-13: the broker shared a refresh-token lineage with the
  # mini's interactive Claude Code, and each rotation invalidated the other
  # (recurring 401s). Tradeoff: sandboxes can read the token from env; egress
  # is proxy-allowlisted, and the token is subscription-scoped + revocable.
  claudeCodeAuthMode: api_key
  # Blank the ANTHROPIC_API_KEY stub so the CLI can't prefer it over
  # CLAUDE_CODE_OAUTH_TOKEN (observed: stub wins precedence when present).
  extraEnv:
    ANTHROPIC_API_KEY: ""

# apiRs.extraEnv.SESSION_SANDBOX_PASSTHROUGH_ENV: env var NAMES forwarded from
# the api-rs pod (which envFroms centaur-infra-env) into every sandbox.
# CLAUDE_CODE_OAUTH_TOKEN carries the dedicated long-lived subscription token
# the Claude Code CLI consumes natively (see sandbox.claudeCodeAuthMode note).

# Slack ETL: scheduled workflows (slack_sync hourly-ish, slack_backfill,
# company_context_documents) that copy Slack channel history into Postgres
# (slack_sync_* tables) and project it into company_context_documents, which
# the company_context tool searches (ParadeDB full-text over the cluster's own
# ai_v2 database via the CENTAUR_POSTGRES_DSN pg_dsn secret).
#
# Deployment prerequisites (NOT expressed in chart values):
#   - centaur-infra-env must contain SLACK_ETL_TOKEN (the workflows read Slack
#     with it via iron-proxy; reuse the bot token from SLACKBOT_API_KEY).
#   - The Slack app needs OAuth scopes: channels:read + users:read (new), and
#     groups:read (new, only because indexPrivateChannels is true below).
#     channels:history / groups:history / files:read are already granted.
#   - The bot must be a member of #spotlight-claude (bot tokens can only read
#     history of channels they are in).
apiRs:
  extraEnv:
    SESSION_SANDBOX_PASSTHROUGH_ENV: "CLAUDE_CODE_OAUTH_TOKEN"
  etl:
    slack:
      # Master switch: registers/enables the slack_sync, slack_backfill and
      # (with companyContextDocuments below) document-projection schedules.
      enabled: true
      # Incremental sync cadence. 30 min keeps agent memory reasonably fresh;
      # with a single channel this is a handful of Slack API calls per run.
      syncIntervalSeconds: 1800
      # Historical window seeded as backfill jobs the first time a channel is
      # synced. 365 days covers #spotlight-claude's full history.
      syncBackfillLookbackDays: 365
      # Trailing window in which existing threads are re-read so late replies
      # and edits are picked up. Claude threads stay active for days; widen
      # from the 3-day default.
      syncThreadLookbackDays: 7
      # Also list private channels (needs groups:read). Safe with the
      # default-deny exclusion list below; covers the case where
      # #spotlight-claude is/becomes private. Private rows are RLS-guarded:
      # only sessions whose principal is in that channel can read them.
      indexPrivateChannels: true
      # SYNC BOUNDARY = BOT MEMBERSHIP (2026-07-13, Tommy's call: sync all the
      # *-internal brand channels + spotlight-claude). Bots can only read
      # history of channels they are members of, so membership is the
      # allowlist: /invite @claude = start syncing, remove the bot = stop.
      # Private-channel rows stay RLS-guarded (visible only to sessions in
      # that channel). The earlier default-deny glob wall is retired; if a
      # public channel the bot idles in must NOT be synced, name it here.
      # #leadership is deliberately NOT ingested (same judgment as the old
      # coach corpus, which excluded leadership-only material). Its already-
      # synced rows were purged 2026-07-13.
      excludedChannelPatterns: "leadership"
      attachments:
        # Skip downloading attachment bytes into Postgres (bytea): the mini's
        # disk is chronically tight and document projection only indexes
        # attachment METADATA (names, types, permalinks), never the bytes, so
        # downloads add storage without adding search value. Metadata rows are
        # still written and searchable.
        enabled: false
      backfill:
        # Drain aggressively: 20 channels x 365d to ingest. Slack's per-app
        # rate limit (~50 req/min on history endpoints) is the real ceiling —
        # the worker retries politely on rate_limited, so a 60s drain interval
        # just keeps the pipe full instead of idling 10 min between sips.
        enabled: true
        intervalSeconds: 60
        channelBatchLimit: 50
        channelPagesPerJob: 10
      retention:
        # Retention pruning stays enabled but with TTL 0 = keep everything
        # forever (this data IS the agents' long-term memory).
        enabled: true
        intervalMinutes: 60
        etlDays: 0
        dmDays: 0
    # Google Drive ETL (workflows/gsuite/drive_sync.py): full text of every
    # Google Doc visible to the GOOGLE_TOKEN_JSON account (incl. shared
    # drives), incremental by modifiedTime. Scope is controlled by WHAT THE
    # CONSENTED ACCOUNT CAN SEE — share folders with it to add knowledge.
    googleDrive:
      enabled: true
      syncIntervalSeconds: 14400
    # Google Calendar ETL (workflows/gsuite/calendar_sync.py): all visible
    # calendars + events, incremental via syncToken (auto resync on 410).
    googleCalendar:
      enabled: true
      syncIntervalSeconds: 14400
    companyContextDocuments:
      # Projects changed slack_sync_* / google_drive_sync_files /
      # google_calendar_sync_events rows into company_context_documents
      # (what company_context actually searches). Tighten from the 4h default
      # to 1h so end-to-end memory lag is ~sync + 1h at worst.
      enabled: true
      intervalSeconds: 3600
      # Max source updated_at window per projection run (chart default).
      maxWindowSeconds: 21600

# Base tools come from our fork rather than paradigmxyz/centaur.
toolServer:
  repo: jaehospotlight/centaur
  visibility: public

repoCache:
  githubToken:
    existingSecretName: centaur-infra-env
    secretKey: GITHUB_TOKEN

overlays:
  sources:
    # Base: our Centaur fork (tools/, workflows/, .agents/skills/).
    - repo: jaehospotlight/centaur
      ref: main
      visibility: public
    # Spotlight overlay lives inside the existing internal repo under
    # centaur-overlay/ (skills, spotlight-metrics tool, morning-brief workflow).
    - repo: jaehospotlight/internal
      ref: coo-system
      visibility: private
      toolsSubdir: centaur-overlay/tools
      workflowsSubdir: centaur-overlay/workflows
      skillsSubdir: centaur-overlay/.agents/skills
    # Training corpus (playbook) checked out into sandboxes for the coach
    # behavior; contributes no tools/workflows/skills surfaces.
    - repo: jaehospotlight/SpotlightHQ
      ref: main
      visibility: private
      toolsSubdir: ""
      workflowsSubdir: ""
      skillsSubdir: ""
