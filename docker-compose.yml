services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_v2
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempo -d ai_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tempo:tempo_dev@postgres:5432/ai_v2
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  etl:
    build: .
    command: ["uv", "run", "ai-v2", "continuous"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tempo:tempo_dev@postgres:5432/ai_v2
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
