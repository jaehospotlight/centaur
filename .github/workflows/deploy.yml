name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    env:
      DEPLOY_DIR: /home/ubuntu/github/paradigmxyz/ai_v2
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    defaults:
      run:
        working-directory: /home/ubuntu/github/paradigmxyz/ai_v2

    steps:
      - name: Pull latest
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Detect changes
        id: changes
        run: |
          DIFF=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "tools=false" >> "$GITHUB_OUTPUT"
          echo "api=false" >> "$GITHUB_OUTPUT"
          echo "slackbot=false" >> "$GITHUB_OUTPUT"
          echo "sandbox=false" >> "$GITHUB_OUTPUT"
          echo "etl=false" >> "$GITHUB_OUTPUT"
          echo "infra=false" >> "$GITHUB_OUTPUT"

          echo "$DIFF" | grep -q '^tools/' && echo "tools=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -q '^src/' && echo "api=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -q '^apps/slackbot/' && echo "slackbot=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -q '^sandbox/' && echo "sandbox=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -qE '^(src/etl/|src/shared/)' && echo "etl=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -qE '^(Dockerfile|pyproject.toml|uv.lock|docker-compose.yml|migrations/|services/|monitoring/)' && echo "infra=true" >> "$GITHUB_OUTPUT" || true

      # Tool-only change → zero-downtime reload (no container restart)
      - name: Reload tools
        if: steps.changes.outputs.tools == 'true' && steps.changes.outputs.api != 'true' && steps.changes.outputs.infra != 'true'
        run: |
          API_SECRET_KEY=$(grep -E '^API_SECRET_KEY=' .env | tail -n1 | cut -d= -f2-)
          curl -sf -X POST http://localhost:8000/admin/reload-tools \
            -H "Authorization: Bearer $API_SECRET_KEY"

      - name: Verify Slackbot package manager consistency
        if: steps.changes.outputs.slackbot == 'true'
        run: |
          test ! -f apps/slackbot/package-lock.json
          cd apps/slackbot
          # Avoid writing /usr/bin shims on self-hosted runners without root.
          corepack pnpm install --frozen-lockfile

      # Infra change → rebuild entire stack (docker-compose, Dockerfile, services/, monitoring/)
      - name: Deploy all services
        if: steps.changes.outputs.infra == 'true'
        run: docker compose up -d --build

      # API+ETL share the same Dockerfile — build once, deploy both.
      # --wait blocks until health checks pass, preventing slackbot from
      # hitting a half-started API.
      - name: Deploy API + ETL
        if: steps.changes.outputs.api == 'true' && steps.changes.outputs.infra != 'true'
        run: docker compose up -d --build --wait api etl

      # ETL-only change (src/etl or src/shared but not src/api) — still same image
      - name: Deploy ETL only
        if: steps.changes.outputs.etl == 'true' && steps.changes.outputs.api != 'true' && steps.changes.outputs.infra != 'true'
        run: docker compose up -d --build etl

      # Slackbot + sandbox are independent — build in parallel
      - name: Deploy slackbot + sandbox
        run: |
          PIDS=()
          if [ "${{ steps.changes.outputs.slackbot }}" = "true" ]; then
            docker compose up -d --build slackbot &
            PIDS+=($!)
          fi
          if [ "${{ steps.changes.outputs.sandbox }}" = "true" ]; then
            docker build -t agent2:latest sandbox/ &
            PIDS+=($!)
          fi
          FAIL=0
          for pid in "${PIDS[@]}"; do
            wait "$pid" || FAIL=1
          done
          exit $FAIL
        if: steps.changes.outputs.slackbot == 'true' || steps.changes.outputs.sandbox == 'true'

      # Restart nginx to re-resolve upstream DNS after container rebuilds
      - name: Restart nginx
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.infra == 'true'
        run: docker compose restart nginx

      # Health check — poll instead of blind sleep
      - name: Health check
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.tools == 'true' || steps.changes.outputs.infra == 'true'
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after 60s"
          exit 1

      # Notify #ai-v2 with LLM summary of what changed
      - name: Notify Slack
        if: always() && steps.changes.outputs.diff != ''
        continue-on-error: true
        run: |
          OPENAI_API_KEY=$(grep -E '^OPENAI_API_KEY=' .env | tail -n1 | cut -d= -f2-)
          SLACK_BOT_TOKEN=$(grep -E '^SLACK_BOT_TOKEN=' .env | tail -n1 | cut -d= -f2-)

          COMPONENTS=""
          [ "${{ steps.changes.outputs.api }}" = "true" ] && COMPONENTS="${COMPONENTS} api"
          [ "${{ steps.changes.outputs.slackbot }}" = "true" ] && COMPONENTS="${COMPONENTS} slackbot"
          [ "${{ steps.changes.outputs.etl }}" = "true" ] && COMPONENTS="${COMPONENTS} etl"
          [ "${{ steps.changes.outputs.sandbox }}" = "true" ] && COMPONENTS="${COMPONENTS} sandbox"
          [ "${{ steps.changes.outputs.tools }}" = "true" ] && COMPONENTS="${COMPONENTS} tools"
          [ "${{ steps.changes.outputs.infra }}" = "true" ] && COMPONENTS="${COMPONENTS} infra"

          export OPENAI_API_KEY SLACK_BOT_TOKEN
          ./scripts/deploy-notify.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}" \
            "$COMPONENTS" \
            "${{ github.repository }}"
