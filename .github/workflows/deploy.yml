name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    env:
      DEPLOY_DIR: /home/ubuntu/github/paradigmxyz/ai_v2
    defaults:
      run:
        working-directory: /home/ubuntu/github/paradigmxyz/ai_v2

    steps:
      - name: Pull latest
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Detect changes
        id: changes
        run: |
          DIFF=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "plugins=false" >> "$GITHUB_OUTPUT"
          echo "api=false" >> "$GITHUB_OUTPUT"
          echo "slackbot=false" >> "$GITHUB_OUTPUT"
          echo "sandbox=false" >> "$GITHUB_OUTPUT"
          echo "etl=false" >> "$GITHUB_OUTPUT"
          echo "infra=false" >> "$GITHUB_OUTPUT"

          echo "$DIFF" | grep -q '^plugins/' && echo "plugins=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -q '^src/' && echo "api=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -q '^apps/slackbot/' && echo "slackbot=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -q '^sandbox/' && echo "sandbox=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -qE '^(src/etl/|src/shared/)' && echo "etl=true" >> "$GITHUB_OUTPUT" || true
          echo "$DIFF" | grep -qE '^(Dockerfile|pyproject.toml|uv.lock|docker-compose.yml|migrations/)' && echo "infra=true" >> "$GITHUB_OUTPUT" || true

      # Plugin-only change → zero-downtime reload (no container restart)
      - name: Reload plugins
        if: steps.changes.outputs.plugins == 'true' && steps.changes.outputs.api != 'true' && steps.changes.outputs.infra != 'true'
        run: |
          API_SECRET_KEY=$(grep -E '^API_SECRET_KEY=' .env | tail -n1 | cut -d= -f2-)
          curl -sf -X POST http://localhost:8000/admin/reload-plugins \
            -H "Authorization: Bearer $API_SECRET_KEY"

      # API core or infra change → rebuild container
      - name: Deploy API
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.infra == 'true'
        run: docker compose up -d --build api

      # ETL change → rebuild container
      - name: Deploy ETL
        if: steps.changes.outputs.etl == 'true' || steps.changes.outputs.infra == 'true'
        run: docker compose up -d --build etl

      # Slackbot change → independent rebuild
      - name: Deploy slackbot
        if: steps.changes.outputs.slackbot == 'true'
        run: docker compose up -d --build slackbot

      # Agent sandbox change → rebuild image
      - name: Build agent image
        if: steps.changes.outputs.sandbox == 'true'
        run: docker build -t agent2:latest sandbox/

      # Health check
      - name: Health check
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.plugins == 'true' || steps.changes.outputs.infra == 'true'
        run: |
          sleep 10
          curl -sf http://localhost:8000/health || exit 1

      # Notify #ai-v2 with LLM summary of what changed
      - name: Notify Slack
        if: always() && steps.changes.outputs.diff != ''
        continue-on-error: true
        run: |
          OPENAI_API_KEY=$(grep -E '^OPENAI_API_KEY=' .env | tail -n1 | cut -d= -f2-)
          SLACK_BOT_TOKEN=$(grep -E '^SLACK_BOT_TOKEN=' .env | tail -n1 | cut -d= -f2-)

          # What was deployed
          COMPONENTS=""
          [ "${{ steps.changes.outputs.api }}" = "true" ] && COMPONENTS="${COMPONENTS} api"
          [ "${{ steps.changes.outputs.slackbot }}" = "true" ] && COMPONENTS="${COMPONENTS} slackbot"
          [ "${{ steps.changes.outputs.etl }}" = "true" ] && COMPONENTS="${COMPONENTS} etl"
          [ "${{ steps.changes.outputs.sandbox }}" = "true" ] && COMPONENTS="${COMPONENTS} sandbox"
          [ "${{ steps.changes.outputs.plugins }}" = "true" ] && COMPONENTS="${COMPONENTS} plugins"
          [ "${{ steps.changes.outputs.infra }}" = "true" ] && COMPONENTS="${COMPONENTS} infra"

          REPO="${{ github.repository }}"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Build commit list with short sha + message + PR number (if merge commit)
          COMMIT_LOG=$(git log --oneline --no-merges "${BEFORE}..${AFTER}" 2>/dev/null || echo "unknown")
          DIFFSTAT=$(git diff --stat "${BEFORE}..${AFTER}" 2>/dev/null | tail -20 || echo "")

          # Build a JSON array of {sha, message, url} for each commit
          COMMIT_JSON=$(git log --no-merges --format='%H %s' "${BEFORE}..${AFTER}" 2>/dev/null | while read -r sha msg; do
            short=$(echo "$sha" | cut -c1-7)
            # Check if commit message references a PR like (#123)
            pr=$(echo "$msg" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
            if [ -n "$pr" ]; then
              url="https://github.com/${REPO}/pull/${pr}"
              link="<${url}|#${pr}>"
            else
              url="https://github.com/${REPO}/commit/${sha}"
              link="<${url}|${short}>"
            fi
            jq -n --arg sha "$short" --arg msg "$msg" --arg link "$link" \
              '{sha: $sha, message: $msg, link: $link}'
          done | jq -s '.')

          # Ask LLM for a categorized changelog
          PROMPT=$(cat <<'PROMPT_END'
You are a deploy-bot writing a Slack changelog. Group changes into categories using these exact headers:
• *Features* — new capabilities
• *Performance* — speed/efficiency improvements
• *Fixes* — bug fixes
• *Other* — refactors, docs, chores

Rules:
- Only include categories that have changes. Omit empty categories.
- Each item is a single bullet: "• <description> (<link>)" where <link> is the commit/PR link from the input.
- Keep descriptions short (under 15 words). Use plain language, no jargon.
- Use Slack formatting ONLY: *bold* for headers, no markdown.
- Output ONLY the categorized list, nothing else.
PROMPT_END
          )
          PROMPT="${PROMPT}

Components deployed:${COMPONENTS}

Commits (with links):
${COMMIT_JSON}

Diff stat:
${DIFFSTAT}"

          SUMMARY=$(curl -sf https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              model: "gpt-4o-mini",
              messages: [{role: "user", content: $prompt}],
              max_tokens: 500
            }')" | jq -r '.choices[0].message.content')

          SHORT_SHA=$(echo "${AFTER}" | cut -c1-7)
          COMPARE_URL="https://github.com/${REPO}/compare/${BEFORE}...${AFTER}"

          # Post to #ai-v2
          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg summary "$SUMMARY" \
              --arg sha "$SHORT_SHA" \
              --arg url "$COMPARE_URL" \
              --arg components "$COMPONENTS" \
              '{
                channel: "C0AJ07U8Z1N",
                text: (":rocket: *Deploy* —" + $components + " (<" + $url + "|" + $sha + ">)\n\n" + $summary),
                unfurl_links: false
              }')"
