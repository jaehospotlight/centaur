secretManager:
  backend: env
  existingSecretName: centaur-infra-env

secrets:
  bootstrapSecretName: centaur-infra-env

slackbot:
  enabled: false

api:
  executionWorkerEnabled: true
  workflowWorkerEnabled: true
  warmPoolEnabled: true
  slackEtlEnabled: false
  victoriaMetricsPushEnabled: false
  egressDiscovery:
    enabled: false
  extraEnv:
    WARM_POOL_SIZE: "2"
    WARM_POOL_REPLENISH_INTERVAL: "1.0"
    WARM_POOL_BACKEND_TIMEOUT: "90.0"

postgres:
  persistence:
    enabled: true
    size: 1Gi

laminar:
  enabled: false
