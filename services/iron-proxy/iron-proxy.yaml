dns:
  listen: ":53"
  proxy_ip: "127.0.0.1"

proxy:
  tunnel_listen: ":8080"

management:
  listen: ":9092"
  api_key_env: "IRON_MANAGEMENT_API_KEY"

tls:
  mode: "mitm"
  ca_cert: "/etc/iron-proxy/ca.crt"
  ca_key: "/etc/iron-proxy/ca.key"

transforms:
  - name: allowlist
    config:
      domains:
        - "*"

log:
  level: "info"
